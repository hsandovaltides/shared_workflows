name: build_apk

on:
  workflow_call:
    inputs:
      node-version:
        description: "Node version"
        required: false
        default: 22
        type: number
      java-version:
        description: "Version de Java"
        required: false
        default: 17
        type: number
      skip-tests:
        description: "Skip tests"
        required: false
        default: true
        type: boolean
      retention-days:
        description: "Days of retention"
        required: false
        default: 15
        type: number
      pnpm-version:
        description: "Pnpm Version"
        required: false
        default: 9
        type: number

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ inputs.pnpm-version }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: pnpm

      # Setup Java con caché de Gradle integrado (MUCHO más rápido)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ inputs.java-version }}
          cache: 'gradle'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Run tests
        if: inputs.skip-tests == false
        run: pnpm test
        continue-on-error: true

      - name: Expo prebuild
        run: npx expo prebuild --platform android
        env:
          CI: true

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # Build con flags de optimización
      - name: Build APK (release)
        working-directory: android
        run: |
          ./gradlew assembleRelease \
            --no-daemon \
            --parallel \
            --build-cache \
            -Dorg.gradle.jvmargs="-Xmx3g -XX:MaxMetaspaceSize=512m"
        
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: eggestime-chile-${{ github.run_number }}
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: ${{ inputs.retention-days }}
          if-no-files-found: error
