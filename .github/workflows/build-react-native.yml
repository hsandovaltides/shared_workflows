name: build_apk

on:
  workflow_call:
    inputs:
      node-version:
        description: "Node version"
        required: false
        default: 22
        type: number
      java-version:
        description: "Version de Java"
        required: false
        default: 17
        type: number
      skip-tests:
        description: "Skip tests"
        required: false
        default: true
        type: boolean
      retention-days:
        description: "Days of retention"
        required: false
        default: 15
        type: number
      pnpm-version:
        description: "Pnpm Version"
        required: false
        default: 9
        type: number

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup pnpm & Node.js ────────────────────────────────────────────────
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ inputs.pnpm-version }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: pnpm

      # ── 3. Java (requerido por Gradle) ────────────────────────────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ inputs.java-version }}

      # ── 4. Dependencias pnpm ──────────────────────────────────────────────────
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── 5. Ejecutar Pruebas ───────────────────────────────────────────────────
      - name: Run tests
        run: pnpm test
        if: inputs.skip-tests == false
        continue-on-error: true

      # ── 6. Expo prebuild (genera la carpeta /android nativa) ──────────────────
      - name: Expo prebuild
        run: npx expo prebuild --platform android --clean
        env:
          # Evita prompts interactivos de Expo
          CI: true

      # ── 7. Caché de Gradle ────────────────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # ── 8. Permisos de ejecución para Gradle wrapper ──────────────────────────
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # ── 9. Build APK debug ────────────────────────────────────────────────────
      - name: Build APK (debug)
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon
        # Cambia a assembleRelease si tienes keystore configurado (ver secrets abajo)

      # ── 10. Subir APK como artefacto ──────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: eggestime-chile-${{ github.run_number }}
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: ${{ inputs.retention-days }}   # días que se guarda en GitHub (máx 90 con plan free)
          if-no-files-found: error
