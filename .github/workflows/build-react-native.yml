name: build_apk

on:
  workflow_call:
    inputs:
      node-version:
        description: "Node version"
        required: false
        default: 22
        type: number
      java-version:
        description: "Version de Java"
        required: false
        default: 17
        type: number
      skip-tests:
        description: "Skip tests"
        required: false
        default: true
        type: boolean
      retention-days:
        description: "Days of retention"
        required: false
        default: 15
        type: number
      pnpm-version:
        description: "Pnpm Version"
        required: false
        default: 9
        type: number
      app-name:
        description: "App Name"
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup pnpm & Node.js ────────────────────────────────────────────────
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ inputs.pnpm-version }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: pnpm

      # ── 3. Java (Sin caché automático para evitar el error) ───────────────────
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ inputs.java-version }}

      # ── 4. Dependencias JS ─────────────────────────────────────────────────────
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      # ── 5. Ejecutar Pruebas ───────────────────────────────────────────────────
      - name: Run tests
        if: inputs.skip-tests == false
        run: pnpm test
        continue-on-error: true

      # ── 6. Expo prebuild (Genera la carpeta /android) ─────────────────────────
      - name: Expo prebuild
        run: npx expo prebuild --platform android
        env:
          CI: true

      # ── 7. Caché de Gradle (Ahora que ya existe la carpeta /android) ──────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # ── 8. Permisos de ejecución ──────────────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # ── 9. Build APK con optimizaciones de rendimiento ────────────────────────
      - name: Build APK (Release)
        working-directory: android
        run: |
          ./gradlew assembleRelease \
            --no-daemon \
            --parallel \
            --build-cache \
            -Dorg.gradle.jvmargs="-Xmx3g -XX:MaxMetaspaceSize=512m"

      # ── 10. Subir APK como artefacto ──────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{inputs.app-name}}-${{ github.run_number }}
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: ${{ inputs.retention-days }}
          if-no-files-found: error
