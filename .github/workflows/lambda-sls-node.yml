name: build-test-deploy
# Changed 'on' to enable this workflow to be called from other workflows
on:
  workflow_call:
    inputs:
      node-version:
        description: "Node version"
        required: true
        type: string
      stage:
        description: "Stage"
        required: true
        type: string
      language:
        description: "language"
        required: true
        type: string
      deepsource:
        description: "deepsource"
        required: true
        type: string
      node-package-manager:
        description: "Package manager"
        default: "pnpm"
        required: false
        type: string
      skip-tests:
        description: "Skip tests"
        required: false
        default: true
        type: boolean
      pnpm-version:
        description: "pnpm version"
        required: false
        default: "9.12.2"
        type: string

env:
  DATADOG_API_KEY: ${{secrets.DATADOG_API_KEY}}

jobs:
  initial:
    uses: hsandovaltides/shared_workflows/.github/workflows/teams-notification.yml@main
    secrets: inherit
    with:
      node-version: ${{ inputs.node-version }}
      description: ${{ github.event.repository.name }}

  test:
    runs-on: ubuntu-latest
    
    steps: 
      - name: checkout repo
        uses: actions/checkout@v4
        if: inputs.skip-tests == false
      - name: use node.js
        uses: actions/setup-node@v4
        if: inputs.skip-tests == false

      - name: Install modules pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ inputs.pnpm-version }}
        if: inputs.node-package-manager == 'pnpm' && inputs.skip-tests == false
      
      - run: npm install
        if: inputs.node-package-manager == 'npm' && inputs.skip-tests == false

      - run: pnpm install
        if: inputs.node-package-manager == 'pnpm' && inputs.skip-tests == false
      
      - name: Run npm test
        run: npm run test
        if: inputs.node-package-manager == 'npm' && inputs.skip-tests == false
        continue-on-error: true
      
      - name: Run pnpm test
        run: pnpm run test
        if: inputs.node-package-manager == 'pnpm' && inputs.skip-tests == false
        continue-on-error: true

      - name: show coverage
        if: inputs.skip-tests == false 
        run: ls ./
        continue-on-error: true

      - name: Report test coverage to DeepSource
        if: inputs.skip-tests == false
        env:
          DEEPSOURCE_DSN: ${{ inputs.deepsource }}
        run: |
          curl https://deepsource.com/cli | sh
          ./bin/deepsource report --analyzer test-coverage --key ${{ inputs.language }} --value-file ./coverage/cobertura-coverage.xml
        continue-on-error: true

        

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEV_REGION }}

      - name: Install modules pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ inputs.pnpm-version }}
        if: inputs.node-package-manager == 'pnpm'
      
      - run: npm install
        if: inputs.node-package-manager == 'npm'

      - run: pnpm install
        if: inputs.node-package-manager == 'pnpm'

      - name: Print Deploy
        run: ./node_modules/serverless/bin/serverless.js print --stage ${{ inputs.stage }}
      - name: Deploy App To Aws
        run: ./node_modules/serverless/bin/serverless.js deploy --stage ${{ inputs.stage }}